<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="grad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7C3AED"/>
      <stop offset="100%" style="stop-color:#A78BFA"/>
    </linearGradient>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A1A2E"/>
      <stop offset="100%" style="stop-color:#0F0F1A"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="256" height="256" rx="48" ry="48" fill="url(#bg)"/>
  <!-- Outer border -->
  <rect x="16" y="16" width="224" height="224" rx="36" ry="36" fill="none" stroke="url(#grad)" stroke-width="4" opacity="0.6"/>
  <!-- Sound waves (arcs) -->
  <path d="M 128 80 A 48 48 0 0 1 176 128" fill="none" stroke="url(#grad)" stroke-width="6" stroke-linecap="round"/>
  <path d="M 128 60 A 68 68 0 0 1 196 128" fill="none" stroke="url(#grad)" stroke-width="5" stroke-linecap="round" opacity="0.7"/>
  <path d="M 128 80 A 48 48 0 0 0 80 128" fill="none" stroke="url(#grad)" stroke-width="6" stroke-linecap="round"/>
  <path d="M 128 60 A 68 68 0 0 0 60 128" fill="none" stroke="url(#grad)" stroke-width="5" stroke-linecap="round" opacity="0.7"/>
  <!-- Microphone body -->
  <rect x="116" y="96" width="24" height="52" rx="12" ry="12" fill="url(#grad)"/>
  <!-- Microphone stand -->
  <path d="M 100 148 A 28 28 0 0 0 156 148" fill="none" stroke="url(#grad)" stroke-width="5" stroke-linecap="round"/>
  <line x1="128" y1="176" x2="128" y2="196" stroke="url(#grad)" stroke-width="5" stroke-linecap="round"/>
  <line x1="112" y1="196" x2="144" y2="196" stroke="url(#grad)" stroke-width="5" stroke-linecap="round"/>
</svg>
